        showId: showIdInput.checked
      };
    }

    const svgNamespace = 'http://www.w3.org/2000/svg';

    function markerIsBlack(s, row, col) {
      const cells = s.markerSize + 4;
      if (row === 1 || row === cells - 2 || col === 1 || col === cells - 2) return true;
      return s.markers[s.markerId][(row - 2) * s.markerSize + (col - 2)] === 1;
    }

    function svgElement(name, attributes) {
      const element = document.createElementNS(svgNamespace, name);
      for (const key in attributes) element.setAttribute(key, String(attributes[key]));
      return element;
    }

    function buildSvgElement(s) {
      const cells = s.markerSize + 4;
      const labelRows = s.showId ? 2 : 0;
      const height = cells + labelRows;
      const svgHeight = Math.round(s.pixelSize * height / cells);
      const svg = svgElement('svg', {
        xmlns: svgNamespace,
        width: s.pixelSize,
        height: svgHeight,
        viewBox: `0 0 ${cells} ${height}`
      });
      const background = svgElement('rect', { width: cells, height, fill: 'white' });
      const group = svgElement('g', { 'shape-rendering': 'crispEdges' });

      svg.appendChild(background);
      svg.appendChild(group);

      for (let row = 1; row < cells - 1; row++) {
        for (let col = 1; col < cells - 1; col++) {
          if (markerIsBlack(s, row, col)) {
            group.appendChild(svgElement('rect', { x: col, y: row, width: 1, height: 1, fill: 'black' }));
          }
        }
      }

      if (s.showId) {
        const label = svgElement('text', {
          x: cells / 2,
          y: cells + 1.35,
          'text-anchor': 'middle',
          'font-family': 'sans-serif',
          'font-size': 1.25
        });
        label.textContent = String(s.markerId);
        svg.appendChild(label);
      }

      return svg;
    }

    function generate() {
      const s = state();
      markerIdInput.max = String(s.maxId);
      markerIdInput.value = String(s.markerId);
      pixelSizeInput.value = String(s.pixelSize);
      markerOutput.replaceChildren(buildSvgElement(s));
      message.textContent = `Valid marker IDs: 0-${s.maxId}.`;
    }

    function svgBlob() {
      const svg = markerOutput.querySelector('svg');
      if (!svg) return null;
      return new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
    }

    function downloadSvg() {
      const blob = svgBlob();
      if (!blob) return;
      const s = state();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `aruco-${s.markerSize}x${s.markerSize}-${s.markerId}.svg`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function downloadPng() {
      const s = state();
      const cells = s.markerSize + 4;
      const labelRows = s.showId ? 2 : 0;
      const moduleSize = Math.max(1, Math.floor(s.pixelSize / cells));
      const width = moduleSize * cells;
      const height = moduleSize * (cells + labelRows);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext('2d');
      if (!context) {
        message.textContent = 'PNG export failed: canvas is not available.';
        return;
      }

      context.imageSmoothingEnabled = false;
      context.fillStyle = 'white';
      context.fillRect(0, 0, width, height);
      context.fillStyle = 'black';

      for (let row = 1; row < cells - 1; row++) {
        for (let col = 1; col < cells - 1; col++) {
          if (markerIsBlack(s, row, col)) {
            context.fillRect(col * moduleSize, row * moduleSize, moduleSize, moduleSize);
          }
        }
      }

      if (s.showId) {
        context.font = `${Math.round(moduleSize * 1.25)}px sans-serif`;
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        context.fillText(String(s.markerId), width / 2, Math.round((cells + 1.2) * moduleSize));
      }

      canvas.toBlob(function (blob) {
        if (!blob) {
          message.textContent = 'PNG export failed.';
          return;
        }
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `aruco-${s.markerSize}x${s.markerSize}-${s.markerId}.png`;
        link.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    dictionaryInput.addEventListener('change', generate);
    markerIdInput.addEventListener('input', generate);
    pixelSizeInput.addEventListener('input', generate);
    showIdInput.addEventListener('change', generate);
    document.getElementById('downloadSvg').addEventListener('click', downloadSvg);
    document.getElementById('downloadPng').addEventListener('click', downloadPng);

    generate();
  </script>
</body>
</html>
